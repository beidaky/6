<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, touch-action=none">
    <title>物理隐形幕布 - 丝滑双指小窗版</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #111; touch-action: none; font-family: sans-serif; color: white; }
        #canvas-container { position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 1; }
        #webcam-video { display: none; }
        #ui-layer { position: absolute; bottom: 20px; right: 20px; z-index: 10; background: rgba(0, 0, 0, 0.7); padding: 15px; border-radius: 10px; border: 1px solid #444; }
        input[type="file"] { max-width: 180px; }
        #status { font-size: 12px; color: #ffaa00; margin-top: 8px; font-weight: bold; }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
</head>
<body>

    <video id="webcam-video" autoplay playsinline muted></video>
    <div id="canvas-container"></div>

    <div id="ui-layer">
        <div>上传幕布背后的惊喜：</div>
        <input type="file" id="media-upload" accept="image/*,video/*">
        <div id="status">检查运行环境中...</div>
    </div>

    <script>
        let videoElement;
        let bgMedia = null; 
        let isVideo = false;
        let environmentReady = false;

        // --- 双手独立追踪状态机 ---
        let handTrackers = [
            { draggedPoint: null, x: 0, y: 0, active: false, pinching: false },
            { draggedPoint: null, x: 0, y: 0, active: false, pinching: false }
        ];

        // --- 物理引擎核心参数调优 ---
        const cols = 35;       // 大幅增加列数，使下摆曲线极其丝滑细腻
        const rows = 20;       // 行数
        const iterations = 5;  // 增加物理迭代，让布料形态更稳定柔软
        const gravity = 0.6;   // 稍稍降低重力，让布料有种轻盈飘动的质感
        const friction = 0.95; // 气流阻尼
        
        let points = [];
        let sticks = [];
        let clothWidth, clothHeight;

        // --- Verlet 物理质点与弹簧连接线 ---
        class Point {
            constructor(x, y, pinned) {
                this.x = x; this.y = y;
                this.oldx = x; this.oldy = y;
                this.pinned = pinned;
            }
            update() {
                if (this.pinned) return;
                let vx = (this.x - this.oldx) * friction;
                let vy = (this.y - this.oldy) * friction;
                this.oldx = this.x; this.oldy = this.y;
                this.x += vx; this.y += vy + gravity;
            }
        }

        class Stick {
            constructor(p1, p2) {
                this.p1 = p1; this.p2 = p2;
                this.length = dist(p1.x, p1.y, p2.x, p2.y);
            }
            update() {
                let dx = this.p2.x - this.p1.x;
                let dy = this.p2.y - this.p1.y;
                let distance = Math.sqrt(dx * dx + dy * dy);
                let difference = this.length - distance;
                let percent = difference / distance / 2;
                let offsetX = dx * percent;
                let offsetY = dy * percent;

                if (!this.p1.pinned) { this.p1.x -= offsetX; this.p1.y -= offsetY; }
                if (!this.p2.pinned) { this.p2.x += offsetX; this.p2.y += offsetY; }
            }
        }

        // 初始化在屏幕正中央的五分之二大小的幕布
        function initCloth() {
            points = []; sticks = [];
            
            // 设定为屏幕宽度的 2/5 (40%)
            clothWidth = windowWidth * 0.4;
            clothHeight = windowHeight * 0.55; 
            
            let spacingX = clothWidth / (cols - 1);
            let spacingY = clothHeight / (rows - 1);
            
            // 计算居中偏移量
            let offsetX = (windowWidth - clothWidth) / 2;
            let offsetY = (windowHeight - clothHeight) / 3; // 略微偏上符合视觉黄金分割

            for (let y = 0; y < rows; y++) {
                for (let x = 0; x < cols; x++) {
                    let px = offsetX + x * spacingX;
                    let py = offsetY + y * spacingY;
                    points.push(new Point(px, py, y === 0)); // 只有顶端一行固定
                }
            }
            for (let y = 0; y < rows; y++) {
                for (let x = 0; x < cols; x++) {
                    let i = x + y * cols;
                    if (x < cols - 1) sticks.push(new Stick(points[i], points[i + 1]));
                    if (y < rows - 1) sticks.push(new Stick(points[i], points[i + cols]));
                }
            }
        }

        function setup() {
            let canvas = createCanvas(windowWidth, windowHeight);
            canvas.parent('canvas-container');

            videoElement = document.getElementById('webcam-video');
            initCloth();

            if (typeof Hands === 'undefined' || typeof Camera === 'undefined') {
                document.getElementById('status').innerText = "❌ 核心AI库加载失败，请检查网络并刷新";
                return;
            }
            environmentReady = true;

            const hands = new Hands({locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`});
            
            // 开启双手模式识别
            hands.setOptions({ 
                maxNumHands: 2, 
                modelComplexity: 0, 
                minDetectionConfidence: 0.5, 
                minTrackingConfidence: 0.5 
            });
            hands.onResults(onHandResults);

            const camera = new Camera(videoElement, {
                onFrame: async () => { await hands.send({image: videoElement}); },
                width: 640, height: 480
            });
            
            camera.start().then(() => { 
                document.getElementById('status').innerText = "✅ 丝滑双指版就绪！请在中央幕布前用双手操作。"; 
                document.getElementById('status').style.color = "#00ff00";
            });

            document.getElementById('media-upload').addEventListener('change', (e) => {
                let file = e.target.files[0];
                if (!file) return;
                let url = URL.createObjectURL(file);
                
                if (file.type.startsWith('video/')) {
                    if (bgMedia && isVideo) bgMedia.remove(); 
                    bgMedia = createVideo([url]);
                    bgMedia.hide();
                    bgMedia.loop();
                    bgMedia.volume(1); 
                    isVideo = true;
                } else {
                    if (bgMedia && isVideo) bgMedia.remove();
                    bgMedia = loadImage(url);
                    isVideo = false;
                }
            });
        }

        // 同时处理两只手的数据流
        function onHandResults(results) {
            let currentHands = results.multiHandLandmarks || [];
            
            for (let i = 0; i < 2; i++) {
                if (i < currentHands.length) {
                    const landmarks = currentHands[i];
                    let ix = (1 - landmarks[8].x) * windowWidth; 
                    let iy = landmarks[8].y * windowHeight;
                    let tx = (1 - landmarks[4].x) * windowWidth; 
                    let ty = landmarks[4].y * windowHeight;
                    
                    let hX = (ix + tx) / 2; 
                    let hY = (iy + ty) / 2;
                    let pinching = dist(ix, iy, tx, ty) < 45; // 优化捏合判定范围

                    handTrackers[i].x = hX;
                    handTrackers[i].y = hY;
                    handTrackers[i].active = true;
                    handTrackers[i].pinching = pinching;

                    if (pinching) {
                        if (!handTrackers[i].draggedPoint) {
                            let minDist = 160; // 扩大抓取感应半径，更易操作
                            let targetPoint = null;
                            
                            for (let p of points) {
                                if (!p.pinned) {
                                    // 避免两只手同时争抢抓取同一个物理节点
                                    let otherHand = handTrackers[1 - i];
                                    if (otherHand.draggedPoint === p) continue;

                                    let d = dist(hX, hY, p.x, p.y);
                                    if (d < minDist) {
                                        minDist = d;
                                        targetPoint = p;
                                    }
                                }
                            }
                            handTrackers[i].draggedPoint = targetPoint;
                        }
                    } else {
                        handTrackers[i].draggedPoint = null;
                    }
                } else {
                    handTrackers[i].draggedPoint = null;
                    handTrackers[i].active = false;
                    handTrackers[i].pinching = false;
                }
            }
        }

        function draw() {
            if (!environmentReady) {
                background(20);
                return;
            }

            background(25);

            // 1. 强制纠正被拖拽点的惯性动量（解决“不跟手/延迟”的死穴）
            for (let i = 0; i < 2; i++) {
                if (handTrackers[i].active && handTrackers[i].pinching && handTrackers[i].draggedPoint) {
                    let p = handTrackers[i].draggedPoint;
                    p.x = handTrackers[i].x;
                    p.y = handTrackers[i].y;
                    p.oldx = handTrackers[i].x; // 强制将上一帧位置同步，抹除物理引擎的反向牵引力
                    p.oldy = handTrackers[i].y;
                }
            }

            // 2. 更新物理引擎
            for (let p of points) p.update();
            for (let i = 0; i < iterations; i++) {
                for (let s of sticks) s.update();
            }

            // 3. 全屏绘制隐藏背景
            if (bgMedia) {
                image(bgMedia, 0, 0, windowWidth, windowHeight);
            } else {
                fill(80); textAlign(CENTER, CENTER); textSize(22); noStroke();
                text("全屏背景区域（请在右下角上传惊喜图片或视频）", windowWidth/2, windowHeight/2);
            }

            // 4. 原生高级遮罩裁剪绘制（彻底去掉网格线条）
            let ctx = drawingContext;
            ctx.save();
            ctx.beginPath();
            
            // 构建闭合路径：上边缘 -> 右边缘 -> 下滑流畅底边缘 -> 左边缘
            ctx.moveTo(points[0].x, points[0].y);
            for(let x=1; x<cols; x++) ctx.lineTo(points[x].x, points[x].y);
            for(let y=1; y<rows; y++) ctx.lineTo(points[cols-1 + y*cols].x, points[cols-1 + y*cols].y);
            // 密集的节点使得这里的循环连线在拉扯时呈现极为柔软的自然垂感
            for(let x=cols-2; x>=0; x--) ctx.lineTo(points[x + (rows-1)*cols].x, points[x + (rows-1)*cols].y);
            for(let y=rows-2; y>0; y--) ctx.lineTo(points[y*cols].x, points[y*cols].y);
            
            ctx.closePath();
            ctx.clip(); // 启用遮罩

            // 在居中小窗遮罩内投射完整的全屏摄像头画面（实现光学隐藏）
            if (videoElement.readyState >= 2) {
                ctx.save();
                ctx.translate(windowWidth, 0); 
                ctx.scale(-1, 1);
                ctx.drawImage(videoElement, 0, 0, windowWidth, windowHeight);
                ctx.restore();
            }

            // 【已移除】原有的网格渲染代码段，还纯净长方形幕布一色
            
            // 为幕布边缘增加一丝高级质感和环境空气阴影
            ctx.strokeStyle = "rgba(0, 0, 0, 0.15)";
            ctx.lineWidth = 3;
            ctx.stroke();
            
            ctx.restore(); // 恢复正常绘制流

            // 5. 渲染双手交互的高光触控圆点提示
            for (let i = 0; i < 2; i++) {
                if (handTrackers[i].active && handTrackers[i].pinching) {
                    fill('rgba(255, 60, 60, 0.85)'); 
                    noStroke(); 
                    circle(handTrackers[i].x, handTrackers[i].y, 16);
                }
            }
        }

        function windowResized() {
            resizeCanvas(windowWidth, windowHeight);
            initCloth(); 
        }
    </script>
</body>
</html>
