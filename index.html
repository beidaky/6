<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, touch-action=none">
    <title>物理隐形幕布 - 最终防弹版</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #111; touch-action: none; font-family: sans-serif; color: white; }
        #canvas-container { position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 1; }
        /* 隐藏源视频，仅作为数据源 */
        #webcam-video { display: none; }
        #ui-layer { position: absolute; bottom: 20px; right: 20px; z-index: 10; background: rgba(0, 0, 0, 0.7); padding: 15px; border-radius: 10px; border: 1px solid #444; }
        input[type="file"] { max-width: 180px; }
        #status { font-size: 12px; color: #ffaa00; margin-top: 8px; font-weight: bold; }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
</head>
<body>

    <video id="webcam-video" autoplay playsinline muted></video>
    <div id="canvas-container"></div>

    <div id="ui-layer">
        <div>上传幕布背后的惊喜：</div>
        <input type="file" id="media-upload" accept="image/*,video/*">
        <div id="status">检查运行环境中...</div>
    </div>

    <script>
        // --- 核心变量 ---
        let videoElement;
        let bgMedia = null; 
        let isVideo = false;
        
        let handX = 0, handY = 0;
        let isPinching = false;
        let draggedPoint = null;
        let environmentReady = false;

        // --- 物理引擎参数 ---
        const cols = 20; 
        const rows = 15; 
        const iterations = 3; 
        const gravity = 0.8;
        const friction = 0.98;
        
        let points = [];
        let sticks = [];
        let clothWidth, clothHeight, spacingX, spacingY;

        // --- Verlet 物理类 ---
        class Point {
            constructor(x, y, pinned) {
                this.x = x; this.y = y;
                this.oldx = x; this.oldy = y;
                this.pinned = pinned;
            }
            update() {
                if (this.pinned) return;
                let vx = (this.x - this.oldx) * friction;
                let vy = (this.y - this.oldy) * friction;
                this.oldx = this.x; this.oldy = this.y;
                this.x += vx; this.y += vy + gravity;
            }
        }

        class Stick {
            constructor(p1, p2) {
                this.p1 = p1; this.p2 = p2;
                this.length = dist(p1.x, p1.y, p2.x, p2.y);
            }
            update() {
                let dx = this.p2.x - this.p1.x;
                let dy = this.p2.y - this.p1.y;
                let distance = Math.sqrt(dx * dx + dy * dy);
                let difference = this.length - distance;
                let percent = difference / distance / 2;
                let offsetX = dx * percent;
                let offsetY = dy * percent;

                if (!this.p1.pinned) { this.p1.x -= offsetX; this.p1.y -= offsetY; }
                if (!this.p2.pinned) { this.p2.x += offsetX; this.p2.y += offsetY; }
            }
        }

        function initCloth() {
            points = []; sticks = [];
            clothWidth = windowWidth; clothHeight = windowHeight;
            spacingX = clothWidth / (cols - 1);
            spacingY = clothHeight / (rows - 1);

            for (let y = 0; y < rows; y++) {
                for (let x = 0; x < cols; x++) {
                    points.push(new Point(x * spacingX, y * spacingY, y === 0));
                }
            }
            for (let y = 0; y < rows; y++) {
                for (let x = 0; x < cols; x++) {
                    let i = x + y * cols;
                    if (x < cols - 1) sticks.push(new Stick(points[i], points[i + 1]));
                    if (y < rows - 1) sticks.push(new Stick(points[i], points[i + cols]));
                }
            }
        }

        // --- 生命周期 ---
        function setup() {
            let canvas = createCanvas(windowWidth, windowHeight);
            canvas.parent('canvas-container');

            videoElement = document.getElementById('webcam-video');
            initCloth();

            // 安全校验：检查 CDN 脚本是否成功加载
            if (typeof Hands === 'undefined' || typeof Camera === 'undefined') {
                document.getElementById('status').innerText = "❌ 核心库加载失败，请刷新重试或检查网络";
                document.getElementById('status').style.color = "red";
                return;
            }
            environmentReady = true;

            const hands = new Hands({locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`});
            hands.setOptions({ maxNumHands: 1, modelComplexity: 0, minDetectionConfidence: 0.5, minTrackingConfidence: 0.5 });
            hands.onResults(onHandResults);

            const camera = new Camera(videoElement, {
                onFrame: async () => { await hands.send({image: videoElement}); },
                width: 640, height: 480
            });
            
            document.getElementById('status').innerText = "正在请求摄像头权限...";
            camera.start().then(() => { 
                document.getElementById('status').innerText = "✅ 魔法已就绪，请在屏幕前捏合手指！"; 
                document.getElementById('status').style.color = "#00ff00";
            }).catch((err) => {
                document.getElementById('status').innerText = "❌ 摄像头启动失败: " + err.message;
                document.getElementById('status').style.color = "red";
            });

            document.getElementById('media-upload').addEventListener('change', (e) => {
                let file = e.target.files[0];
                if (!file) return;
                let url = URL.createObjectURL(file);
                
                if (file.type.startsWith('video/')) {
                    if (bgMedia && isVideo) bgMedia.remove(); 
                    bgMedia = createVideo([url]);
                    bgMedia.hide();
                    bgMedia.loop();
                    bgMedia.volume(1); 
                    isVideo = true;
                } else {
                    if (bgMedia && isVideo) bgMedia.remove();
                    bgMedia = loadImage(url);
                    isVideo = false;
                }
            });
        }

        function onHandResults(results) {
            if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
                const landmarks = results.multiHandLandmarks[0];
                let ix = (1 - landmarks[8].x) * windowWidth; let iy = landmarks[8].y * windowHeight;
                let tx = (1 - landmarks[4].x) * windowWidth; let ty = landmarks[4].y * windowHeight;
                
                handX = (ix + tx) / 2; handY = (iy + ty) / 2;
                isPinching = dist(ix, iy, tx, ty) < 40; 

                if (isPinching) {
                    if (!draggedPoint) {
                        let minDist = 150; 
                        for (let p of points) {
                            if (!p.pinned && dist(handX, handY, p.x, p.y) < minDist) {
                                minDist = dist(handX, handY, p.x, p.y);
                                draggedPoint = p;
                            }
                        }
                    }
                    if (draggedPoint) {
                        draggedPoint.x = handX;
                        draggedPoint.y = handY;
                    }
                } else {
                    draggedPoint = null; 
                }
            } else {
                isPinching = false; draggedPoint = null;
            }
        }

        function draw() {
            if (!environmentReady) {
                background(20);
                return;
            }

            background(30);

            for (let p of points) p.update();
            for (let i = 0; i < iterations; i++) {
                for (let s of sticks) s.update();
            }

            // 绘制底图
            if (bgMedia) {
                image(bgMedia, 0, 0, windowWidth, windowHeight);
            } else {
                fill(100); textAlign(CENTER, CENTER); textSize(20); noStroke();
                text("幕布背后是空的，请在右下角上传", windowWidth/2, windowHeight/2);
            }

            // 纯净的原生渲染域 (杜绝状态污染)
            let ctx = drawingContext;
            ctx.save();
            ctx.beginPath();
            
            ctx.moveTo(points[0].x, points[0].y);
            for(let x=1; x<cols; x++) ctx.lineTo(points[x].x, points[x].y);
            for(let y=1; y<rows; y++) ctx.lineTo(points[cols-1 + y*cols].x, points[cols-1 + y*cols].y);
            for(let x=cols-2; x>=0; x--) ctx.lineTo(points[x + (rows-1)*cols].x, points[x + (rows-1)*cols].y);
            for(let y=rows-2; y>0; y--) ctx.lineTo(points[y*cols].x, points[y*cols].y);
            
            ctx.closePath();
            ctx.clip(); 

            // 绘制伪装层
            if (videoElement.readyState >= 2) {
                ctx.save();
                ctx.translate(windowWidth, 0); 
                ctx.scale(-1, 1);
                ctx.drawImage(videoElement, 0, 0, windowWidth, windowHeight);
                ctx.restore();
            }

            // 修复：完全使用原生 Canvas 接口画线，不混用 p5 的 stroke()
            ctx.strokeStyle = "rgba(0, 0, 0, 0.25)";
            ctx.lineWidth = 1;
            ctx.beginPath();
            for (let s of sticks) {
                ctx.moveTo(s.p1.x, s.p1.y);
                ctx.lineTo(s.p2.x, s.p2.y);
            }
            ctx.stroke();
            
            ctx.restore(); 

            // 绘制手势
            if (isPinching) {
                fill('rgba(255, 50, 50, 0.8)'); noStroke(); circle(handX, handY, 20);
            }
        }

        function windowResized() {
            resizeCanvas(windowWidth, windowHeight);
            initCloth(); 
        }
    </script>
</body>
</html>
